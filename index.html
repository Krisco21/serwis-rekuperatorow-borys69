        // ========== FUNCTIONS ==========
        function showGrid() {
            document.getElementById('gridView').classList.remove('hidden');
            document.getElementById('detailView').classList.remove('active');
        }

        function showDetail(sectionId) {
            const section = sections.find(s => s.id === sectionId);
            if (!section) return;

            document.getElementById('gridView').classList.add('hidden');
            document.getElementById('detailView').classList.add('active');

            let detailHTML = `
                <div class="detail-header">
                    <button class="back-button" onclick="showGrid()">← Powrót do spisu</button>
                    <div>
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <span class="detail-icon">${section.icon}</span>
                            <div>
                                <h1 class="detail-title">${section.title}</h1>
                                <div class="breadcrumb">Sekcja ${sectionId} / 10</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            section.blocks.forEach((block, idx) => {
                detailHTML += `
                    <div class="content-block">
                        <h2 class="block-heading ${block.headingColor}">${block.heading}</h2>
                        <ul class="bullet-list ${block.headingColor}">
                            ${block.content.map(item => `<li>${item}</li>`).join('')}
                        </ul>
                    </div>
                `;
            });

            document.getElementById('detailContent').innerHTML = detailHTML;
            window.scrollTo(0, 0);
        }

        // ========== RENDER GRID ==========
        function renderGrid() {
            const gridView = document.getElementById('gridView');
            gridView.innerHTML = sections.map(section => `
                <div class="card" onclick="showDetail(${section.id})">
                    <span class="card-icon">${section.icon}</span>
                    <h3 class="card-title">${section.title}</h3>
                    <p class="card-subtitle">${section.subtitle}</p>
                    <div class="card-tags">
                        ${section.tags.map(tag => `<span class="tag ${section.tagColor}">${tag}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        // ========== INIT ==========
        document.addEventListener('DOMContentLoaded', renderGrid);
    </script>
